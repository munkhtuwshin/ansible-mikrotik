---
- name: Cisco төхөөрөмжөөс running-config backup авах
  hosts: cisco
  gather_facts: no
  connection: network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    backup_path: ./backup

  tasks:
    - name: Running-config татах
      cisco.ios.ios_config:
        backup: yes
        backup_options:
          filename: "{{ inventory_hostname }}-running-config.txt"
          dir_path: "{{ Desktop }}"
